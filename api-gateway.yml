server:
  port: 8089

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      x-forwarded:
        prefix-enabled: false   

      routes:
        - id: auth-service-api-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth/v3/api-docs
          filters:
            - RewritePath=/auth/v3/api-docs, /v3/api-docs

        - id: catalog-service-api-docs
          uri: lb://catalog-service
          predicates:
            - Path=/catalog/v3/api-docs
          filters:
            - RewritePath=/catalog/v3/api-docs, /v3/api-docs

        - id: order-service-api-docs
          uri: lb://order-service
          predicates:
            - Path=/orders/v3/api-docs
          filters:
            - RewritePath=/orders/v3/api-docs, /v3/api-docs

        - id: admin-service-api-docs
          uri: lb://admin-service
          predicates:
            - Path=/admin/v3/api-docs
          filters:
            - RewritePath=/admin/v3/api-docs, /v3/api-docs

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/catalog/**
          filters:
            - name: JwtAuthenticationFilter

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**
          filters:
            - name: JwtAuthenticationFilter
            
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - name: JwtAuthenticationFilter
